version: '3.9'

services:
  generador:
    build:
      context: ./Generador
      dockerfile: Dockerfile
    container_name: generador
    restart: unless-stopped
    ports:
      - "${GENERADOR_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  usuario:
    build:
      context: ./Usuario
      dockerfile: Dockerfile
    container_name: usuario
    restart: unless-stopped
    ports:
      - "${USUARIO_PORT:-5173}:5173"
    networks:
      - frontend_network

  plantillas:
    build:
      context: ./Plantillas
      dockerfile: Dockerfile
    container_name: plantillas
    restart: unless-stopped
    ports:
      - "${PLANTILLAS_PORT:-8080}:8080"
    networks:
      - backend_network

  infraestructura:
    build:
      context: ./Estructura institucional
      dockerfile: Dockerfile
    container_name: infraestructura
    restart: unless-stopped
    ports:
      - "${INFRA_PORT:-80}:80"
    networks:
      - frontend_network

