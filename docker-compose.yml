version: '3.8'

services:
  # Frontend - Nginx (Estructura Institucional)
  infraestructura:
    build:
      context: ./Estructura institucional
      dockerfile: Dockerfile
    container_name: infraestructura
    restart: unless-stopped
    ports:
      - "${INFRA_PORT:-80}:80"
    networks:
      - frontend_network
    depends_on:
      generador:
        condition: service_healthy
      usuario:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend - Generador
  generador:
    build:
      context: ./Generador
      dockerfile: Dockerfile
    container_name: generador
    restart: unless-stopped
    ports:
      - "${GENERADOR_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend - Usuario
  usuario:
    build:
      context: ./Usuario
      dockerfile: Dockerfile
    container_name: usuario
    restart: unless-stopped
    ports:
      - "${USUARIO_PORT:-5173}:5173"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend - Plantillas
  plantillas:
    build:
      context: ./Plantillas
      dockerfile: Dockerfile
    container_name: plantillas
    restart: unless-stopped
    ports:
      - "${PLANTILLAS_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - backend_network

  infraestructura:
    build:
      context: ./Estructura institucional
      dockerfile: Dockerfile
    container_name: infraestructura
    restart: unless-stopped
    ports:
      - "${INFRA_PORT:-80}:80"
    networks:
      - frontend_network


networks:
  backend_network:
    driver: bridge
  frontend_network:
    driver: bridge
